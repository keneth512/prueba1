<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
<title>Shooter Selva Pro - Dual Touch Fix</title>

<style>
body {
    margin: 0; overflow: hidden; background: #000;
    user-select: none; -webkit-user-select: none; touch-action: none;
    font-family: Arial, sans-serif;
}

/* INTERFAZ DE INDICACIONES */
#tutorial-overlay {
    position: absolute; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.9); color: #fff;
    display: flex; flex-direction: column; justify-content: center;
    align-items: center; z-index: 100; text-align: center; padding: 20px;
    box-sizing: border-box;
}
.instruccion { margin: 8px 0; color: #00ff99; font-size: 16px; }
#start-btn {
    margin-top: 20px; padding: 12px 35px; background: #00ff99;
    color: #000; font-weight: bold; border-radius: 30px; cursor: pointer;
    border: none; font-size: 18px;
}

/* BARRAS DE ESTADO */
#ui-top {
    position: absolute; top: 10px; left: 10px; z-index: 10; pointer-events: none;
}
.stat-box { margin-bottom: 5px; }
.label { font-size: 11px; color: #ccc; margin-bottom: 2px; }
.bar-bg { width: 140px; height: 8px; background: #222; border: 1px solid #fff; }
.bar-fill { width: 100%; height: 100%; transition: width 0.3s; }
#castle-bar { background: #00ff00; }
#wave-bar { background: #00aaff; width: 0%; }
#boss-ui { display: none; margin-top: 8px; }
#boss-bar { background: #ff00ff; border: 1px solid #ffaa00; }

/* ZONAS DIVIDIDAS DE LA PANTALLA */
#left-touch-zone {
    position: absolute; top: 0; left: 0; width: 50%; height: 100%; z-index: 20;
}
#right-touch-zone {
    position: absolute; top: 0; right: 0; width: 50%; height: 100%; z-index: 20;
}

/* ELEMENTOS VISUALES DE CONTROL */
#joystick-container {
    position: absolute; bottom: 40px; left: 40px;
    width: 110px; height: 110px; background: rgba(255,255,255,0.1);
    border-radius: 50%; border: 2px solid rgba(255,255,255,0.3);
    display: flex; justify-content: center; align-items: center;
    pointer-events: none; /* Evita interferencias con el sistema TouchZone */
}
#joystick-handle {
    width: 45px; height: 45px; background: rgba(255,255,255,0.5);
    border-radius: 50%; position: absolute; pointer-events: none;
}
#fire-btn {
    position: absolute; bottom: 45px; right: 45px;
    width: 90px; height: 90px; background: rgba(255, 0, 50, 0.5);
    border: 3px solid rgba(255, 255, 255, 0.7); border-radius: 50%;
    display: flex; justify-content: center; align-items: center;
    color: white; font-weight: bold; font-size: 14px; z-index: 30;
    -webkit-tap-highlight-color: transparent;
}
#crosshair {
    position: absolute; top: 50%; left: 50%; width: 12px; height: 12px;
    border: 2px solid rgba(255,255,255,0.7); border-radius: 50%;
    transform: translate(-50%, -50%); pointer-events: none; z-index: 15;
}
</style>
</head>
<body>

<div id="tutorial-overlay">
    <h1 style="color: #00ff99; margin-bottom: 5px; font-size: 24px;">SELVA SHOOTER 3D</h1>
    <p style="color: #ffaa00; font-size: 15px;">🔄 Recomendado: Pantalla Horizontal</p>
    <div class="instruccion">🕹️ LADO IZQUIERDO: Desliza para moverte</div>
    <div class="instruccion">🔄 LADO DERECHO: Desliza para apuntar (¡Sensibilidad Alta!)</div>
    <div class="instruccion">🔴 BOTÓN ROJO: Presiona para disparar</div>
    <button id="start-btn">¡JUGAR!</button>
</div>

<div id="crosshair"></div>

<div id="ui-top">
    <div id="score-text" style="color: white; font-size: 18px; font-weight: bold;">Puntos: 0</div>
    <div class="stat-box">
        <div class="label">Castillo</div>
        <div class="bar-bg"><div id="castle-bar" class="bar-fill"></div></div>
    </div>
    <div class="stat-box">
        <div id="wave-text" class="label">Oleada: 1</div>
        <div class="bar-bg"><div id="wave-bar" class="bar-fill"></div></div>
    </div>
    <div id="boss-ui">
        <div class="label" style="color: #ff55ff; font-weight: bold;">¡JEFE FINAL!</div>
        <div class="bar-bg"><div id="boss-bar" class="bar-fill"></div></div>
    </div>
</div>

<div id="left-touch-zone">
    <div id="joystick-container">
        <div id="joystick-handle"></div>
    </div>
</div>

<div id="right-touch-zone">
    <button id="fire-btn">FUEGO</button>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js';

// --- CONFIGURACIÓN ESCENA ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a2a3a);
scene.fog = new THREE.FogExp2(0x1a2a3a, 0.02);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const playerBase = new THREE.Object3D();
playerBase.position.set(0, 1.6, 8);
scene.add(playerBase);
playerBase.add(camera);

// --- LUCES ---
const light = new THREE.DirectionalLight(0xffffff, 1.4);
light.position.set(10, 25, 10);
scene.add(light);
scene.add(new THREE.AmbientLight(0x778899, 0.6));

// --- ENTORNO ---
const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 300), new THREE.MeshPhongMaterial({color: 0x1a331a}));
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// Árboles
for(let i=0; i<45; i++){
    const tree = new THREE.Group();
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 3, 5), new THREE.MeshPhongMaterial({color: 0x4a2e16}));
    const leaves = new THREE.Mesh(new THREE.SphereGeometry(1.4, 4, 4), new THREE.MeshPhongMaterial({color: 0x168f00}));
    leaves.position.y = 2.5;
    tree.add(trunk, leaves);
    tree.position.set((Math.random()-0.5)*45, 1.5, -Math.random()*150);
    scene.add(tree);
}

// Castillo
const castle = new THREE.Mesh(new THREE.BoxGeometry(16, 6, 4), new THREE.MeshPhongMaterial({color: 0x555555}));
castle.position.set(0, 3, 14);
scene.add(castle);

// --- VARIABLES DE JUEGO ---
let score = 0, castleLife = 20, wave = 1, enemiesKilled = 0, enemiesPerWave = 10;
let bossActive = false, bossLife = 40, bossMesh = null;
let isGameRunning = false;

// --- GESTIÓN EXCLUSIVA: MITAD IZQUIERDA (JOYSTICK) ---
const leftZone = document.getElementById('left-touch-zone');
const joyHandle = document.getElementById('joystick-handle');
const joyContainer = document.getElementById('joystick-container');
let moveX = 0;
let joystickTouchId = null;

leftZone.addEventListener('touchstart', e => {
    e.preventDefault();
    if (joystickTouchId !== null) return; // Ignorar segundos toques en este lado
    
    const touch = e.changedTouches[0];
    joystickTouchId = touch.identifier;
}, { passive: false });

leftZone.addEventListener('touchmove', e => {
    e.preventDefault();
    if (joystickTouchId === null) return;

    // Buscar el toque correcto del joystick
    let activeTouch = null;
    for(let i=0; i<e.touches.length; i++) {
        if(e.touches[i].identifier === joystickTouchId) {
            activeTouch = e.touches[i];
            break;
        }
    }
    if (!activeTouch) return;

    const rect = joyContainer.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    let dx = activeTouch.clientX - centerX;
    const maxRadius = rect.width / 2;

    // Limitar el movimiento del handle visual
    dx = Math.max(-maxRadius, Math.min(maxRadius, dx));
    joyHandle.style.transform = `translateX(${dx}px)`;
    
    // Asignar velocidad de movimiento en base al desplazamiento
    moveX = dx / maxRadius;
}, { passive: false });

leftZone.addEventListener('touchend', e => {
    e.preventDefault();
    for(let i=0; i<e.changedTouches.length; i++) {
        if(e.changedTouches[i].identifier === joystickTouchId) {
            joystickTouchId = null;
            joyHandle.style.transform = `translateX(0px)`;
            moveX = 0;
            break;
        }
    }
});

// --- GESTIÓN EXCLUSIVA: MITAD DERECHA (ROTACIÓN DE MIRADA) ---
const rightZone = document.getElementById('right-touch-zone');
let lookTouchId = null;
let lastTouchX = 0, lastTouchY = 0;
let pitch = 0, yaw = 0;

rightZone.addEventListener('touchstart', e => {
    // Si el toque cae exactamente en el botón de disparo, no activar rotación de cámara
    if(e.target.id === 'fire-btn') return;

    if (lookTouchId !== null) return;
    
    const touch = e.changedTouches[0];
    lookTouchId = touch.identifier;
    lastTouchX = touch.clientX;
    lastTouchY = touch.clientY;
});

rightZone.addEventListener('touchmove', e => {
    if (lookTouchId === null) return;

    let activeTouch = null;
    for(let i=0; i<e.touches.length; i++) {
        if(e.touches[i].identifier === lookTouchId) {
            activeTouch = e.touches[i];
            break;
        }
    }
    if (!activeTouch) return;

    const dx = activeTouch.clientX - lastTouchX;
    const dy = activeTouch.clientY - lastTouchY;

    // SENSILIBIDAD SIGNIFICATIVAMENTE OPTIMIZADA (De 0.005 subió a 0.016)
    const sensitivity = 0.016;
    yaw -= dx * sensitivity;
    pitch -= dy * sensitivity;
    
    pitch = Math.max(-Math.PI/2.3, Math.min(Math.PI/2.3, pitch));
    
    playerBase.rotation.y = yaw;
    camera.rotation.x = pitch;

    lastTouchX = activeTouch.clientX;
    lastTouchY = activeTouch.clientY;
});

rightZone.addEventListener('touchend', e => {
    for(let i=0; i<e.changedTouches.length; i++) {
        if(e.changedTouches[i].identifier === lookTouchId) {
            lookTouchId = null;
            break;
        }
    }
});

// --- SISTEMA DE BALAS ---
const bullets = [];
function fire(){
    if(!isGameRunning) return;
    const b = new THREE.Mesh(new THREE.SphereGeometry(0.15, 4, 4), new THREE.MeshBasicMaterial({color: 0xffff00}));
    b.position.copy(playerBase.position);
    
    const dir = new THREE.Vector3();
    camera.getWorldDirection(dir);
    b.userData.dir = dir.normalize();
    
    bullets.push(b);
    scene.add(b);
    playSfx(600, 0.08);
}

// Botón de disparo dedicado
document.getElementById('fire-btn').addEventListener('touchstart', e => {
    e.preventDefault(); 
    fire();
});

// --- AUDIO SINTETIZADO ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSfx(f, d){
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.setValueAtTime(f, audioCtx.currentTime);
    g.gain.setValueAtTime(0.08, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
    o.start(); o.stop(audioCtx.currentTime + d);
}

// --- LOGICA DE ENEMIGOS ---
const enemies = [];
function spawn(){
    if(!isGameRunning || bossActive || enemiesKilled >= enemiesPerWave) return;
    const e = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshPhongMaterial({color: 0xff3333}));
    e.position.set((Math.random()-0.5)*12, 0.5, -80);
    enemies.push(e);
    scene.add(e);
}
setInterval(spawn, 1000);

function spawnBoss(){
    bossActive = true; bossLife = 40;
    bossMesh = new THREE.Mesh(new THREE.BoxGeometry(3.8, 3.8, 3.8), new THREE.MeshPhongMaterial({color: 0x00ff66}));
    bossMesh.position.set(0, 1.9, -80);
    scene.add(bossMesh);
    document.getElementById('boss-ui').style.display = 'block';
}

// --- ACTUALIZACIONES POR FRAME ---
function update(){
    if(!isGameRunning) return;

    // Movimiento fluido derivado del Joystick
    playerBase.position.x += moveX * 0.16;
    playerBase.position.x = Math.max(-7.5, Math.min(7.5, playerBase.position.x));

    // Desplazamiento de balas
    bullets.forEach((b, i) => {
        b.position.addScaledVector(b.userData.dir, 1.3);
        if(b.position.z < -110 || b.position.z > 20) { scene.remove(b); bullets.splice(i, 1); }
    });

    // Avance de enemigos comunes
    enemies.forEach((e, i) => {
        e.position.z += 0.16;
        if(e.position.z > 13) {
            scene.remove(e); enemies.splice(i, 1);
            castleLife--; updateUI();
            if(castleLife <= 0) endGame();
        }
    });

    // Movimiento del Jefe Final
    if(bossActive && bossMesh){
        bossMesh.position.z += 0.055;
        if(bossMesh.position.z > 13) { 
            castleLife -= 5; bossActive = false; scene.remove(bossMesh); 
            document.getElementById('boss-ui').style.display = 'none';
            updateUI(); if(castleLife <= 0) endGame();
        }
    }

    // Comprobación de impactos
    bullets.forEach((b, bi) => {
        if(bossActive && bossMesh && b.position.distanceTo(bossMesh.position) < 2.4){
            scene.remove(b); bullets.splice(bi, 1);
            bossLife--; updateUI();
            playSfx(150, 0.12);
            if(bossLife <= 0){
                scene.remove(bossMesh); bossActive = false;
                score += 50; enemiesKilled = 0; wave++; 
                enemiesPerWave += 5; updateUI();
                document.getElementById('boss-ui').style.display = 'none';
            }
        }
        enemies.forEach((e, ei) => {
            if(b.position.distanceTo(e.position) < 0.9){
                scene.remove(b); scene.remove(e);
                bullets.splice(bi, 1); enemies.splice(ei, 1);
                score++; enemiesKilled++; updateUI();
                if(enemiesKilled >= enemiesPerWave) spawnBoss();
            }
        });
    });
}

function updateUI(){
    document.getElementById('score-text').innerText = `Puntos: ${score}`;
    document.getElementById('castle-bar').style.width = `${(castleLife/20)*100}%`;
    document.getElementById('wave-bar').style.width = `${(enemiesKilled/enemiesPerWave)*100}%`;
    document.getElementById('wave-text').innerText = `Oleada: ${wave}`;
    if(bossActive) document.getElementById('boss-bar').style.width = `${(bossLife/40)*100}%`;
}

function endGame(){
    isGameRunning = false;
    alert("¡EL CASTILLO HA CAÍDO!\nPuntaje Máximo: " + score);
    location.reload();
}

function animate(){
    requestAnimationFrame(animate);
    update();
    renderer.render(scene, camera);
}

// Inicialización de Pantalla Completa y juego
document.getElementById('start-btn').addEventListener('click', () => {
    document.getElementById('tutorial-overlay').style.display = 'none';
    if(audioCtx.state === 'suspended') audioCtx.resume();
    isGameRunning = true;
});

animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
