<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
<title>Shooter 3D Selva - Edición Móvil</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none; /* Evita gestos nativos del navegador como scroll o recarga */
}

#ui-container {
    position: absolute;
    top: 8px;
    left: 8px;
    color: white;
    font-family: Arial, sans-serif;
    z-index: 10;
    pointer-events: none;
}

#score{
    font-size: 20px;
    margin-bottom: 2px;
    text-shadow: 2px 2px 2px black;
}

#waveText{
    font-size: 16px;
    margin-bottom: 5px;
    text-shadow: 2px 2px 2px black;
}

.bar-label {
    font-size: 11px;
    margin-bottom: 1px;
    text-shadow: 1px 1px 1px black;
}

#castleLifeContainer, #waveContainer, #bossLifeContainer {
    width: 160px;
    height: 14px;
    border: 1.5px solid white;
    background: #222;
    margin-bottom: 6px;
}

#castleLifeBar{
    width: 100%;
    height: 100%;
    background: #00ff00;
}

#waveBar{
    width: 0%;
    height: 100%;
    background: #00aaff;
}

#bossLifeContainer {
    display: none;
    border-color: #ffaa00;
}

#bossLifeBar {
    width: 100%;
    height: 100%;
    background: #ff00ff;
}

#crosshair {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 8px;
    height: 8px;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 10;
}
#crosshair::before, #crosshair::after {
    content: '';
    position: absolute;
    background: rgba(255, 255, 255, 0.7);
}
#crosshair::before { top: 3px; left: -4px; width: 16px; height: 2px; }
#crosshair::after { top: -4px; left: 3px; width: 2px; height: 16px; }

/* BOTONES TÁCTILES ADAPTADOS PARA LOS PULGARES */
.touch-btn {
    position: absolute;
    bottom: 25px;
    width: 75px;
    height: 75px;
    background: rgba(255, 255, 255, 0.25);
    border: 3px solid rgba(255, 255, 255, 0.6);
    border-radius: 50%;
    color: white;
    font-family: Arial, sans-serif;
    font-size: 28px;
    font-weight: bold;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 15;
    /* Evita comportamientos visuales por defecto en iOS/Android al presionar */
    -webkit-tap-highlight-color: transparent; 
}
.touch-btn:active {
    background: rgba(0, 255, 153, 0.5);
    border-color: #00ff99;
}
#btn-left { left: 20px; }
#btn-right { right: 20px; }
</style>
</head>
<body>

<div id="btn-left" class="touch-btn">A</div>
<div id="btn-right" class="touch-btn">D</div>

<div id="crosshair"></div>

<div id="ui-container">
    <div id="score">Puntos: 0</div>
    <div id="waveText">Oleada: 1</div>
    
    <div class="bar-label">Castillo HP</div>
    <div id="castleLifeContainer">
        <div id="castleLifeBar"></div>
    </div>
    
    <div class="bar-label">Oleada</div>
    <div id="waveContainer">
        <div id="waveBar"></div>
    </div>

    <div id="bossLabel" class="bar-label" style="display: none; color: #ff55ff; font-weight: bold;">¡JEFE FINAL!</div>
    <div id="bossLifeContainer">
        <div id="bossLifeBar"></div>
    </div>
</div>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js';

// ======================
// ESCENA Y CONFIGURACIÓN BASE
// ======================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a2f3a);
scene.fog = new THREE.FogExp2(0x1a2f3a, 0.018);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Optimiza rendimiento reduciendo exceso de resolución
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// ======================
// CONTROLES EN PRIMERA PERSONA MÓVIL (TOUCH)
// ======================
const fpsControls = new THREE.Object3D();
fpsControls.position.set(0, 1.5, 8);
scene.add(fpsControls);
fpsControls.add(camera);

let pitch = 0;
let yaw = 0;

// Variables de arrastre táctil
let previousTouchX = 0;
let previousTouchY = 0;
let isTouching = false;

// Reloj interno para disparo automático rápido continuo
let autoFireInterval = null;

document.addEventListener('touchstart', (e) => {
    // Si el toque proviene de los botones de movimiento, ignoramos la rotación/disparo
    if (e.target.classList.contains('touch-btn')) return;

    isTouching = true;
    previousTouchX = e.touches[0].clientX;
    previousTouchY = e.touches[0].clientY;

    // Disparar inmediatamente al tocar e iniciar ráfaga automática
    fireBullet();
    if(!autoFireInterval) {
        autoFireInterval = setInterval(fireBullet, 160);
    }
}, { passive: false });

document.addEventListener('touchmove', (e) => {
    if (!isTouching) return;

    const touchX = e.touches[0].clientX;
    const touchY = e.touches[0].clientY;

    const deltaX = touchX - previousTouchX;
    const deltaY = touchY - previousTouchY;

    // Sensibilidad táctil ajustada para pantallas móviles
    const sensitivity = 0.005;
    yaw -= deltaX * sensitivity;
    pitch -= deltaY * sensitivity;

    pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));

    fpsControls.rotation.y = yaw;
    camera.rotation.x = pitch;

    previousTouchX = touchX;
    previousTouchY = touchY;
}, { passive: false });

document.addEventListener('touchend', (e) => {
    // Si aún quedan dedos activos en la pantalla, verificar si es el del disparo
    if (e.touches.length === 0) {
        isTouching = false;
        clearInterval(autoFireInterval);
        autoFireInterval = null;
    }
});

// Manejo de botones de movimiento por interfaz touch
const keys = { KeyA: false, KeyD: false };

document.getElementById('btn-left').addEventListener('touchstart', (e) => { e.preventDefault(); keys.KeyA = true; });
document.getElementById('btn-left').addEventListener('touchend', (e) => { e.preventDefault(); keys.KeyA = false; });
document.getElementById('btn-right').addEventListener('touchstart', (e) => { e.preventDefault(); keys.KeyD = true; });
document.getElementById('btn-right').addEventListener('touchend', (e) => { e.preventDefault(); keys.KeyD = false; });

// ======================
// LUCES Y CIELO CON NUBES
// ======================
const light = new THREE.DirectionalLight(0xffffff, 1.5);
light.position.set(20, 40, 20);
light.castShadow = true;
scene.add(light);

const ambient = new THREE.AmbientLight(0x779977, 0.8);
scene.add(ambient);

const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.4);
scene.add(hemiLight);

const cloudGroup = new THREE.Group();
function createCloud(x, y, z) {
    const group = new THREE.Group();
    const cloudMat = new THREE.MeshLambertMaterial({color: 0xffffff, transparent: true, opacity: 0.8});
    const numBlobs = 3;
    
    for(let i = 0; i < numBlobs; i++) {
        const size = 2.5 + Math.random() * 3;
        const blob = new THREE.Mesh(new THREE.SphereGeometry(size, 5, 5), cloudMat); // Segmentos reducidos para móviles
        blob.position.set(i * 2.5 - 3, Math.random(), Math.random());
        group.add(blob);
    }
    group.position.set(x, y, z);
    cloudGroup.add(group);
}
for(let i = 0; i < 15; i++) {
    createCloud((Math.random() - 0.5) * 120, 35 + Math.random() * 5, -Math.random() * 150 + 10);
}
scene.add(cloudGroup);

// ======================
// ENTORNO SUELO, ARBOLES, RIELES
// ======================
const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(60, 250),
    new THREE.MeshPhongMaterial({ color: 0x1e351e })
);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

function createTree(x, z) {
    const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.25, 0.4, 4, 5), // Geometrías de bajos polígonos
        new THREE.MeshPhongMaterial({ color: 0x4a2e16 })
    );
    trunk.position.set(x, 2, z);

    const leaves = new THREE.Mesh(
        new THREE.SphereGeometry(1.8, 5, 5),
        new THREE.MeshPhongMaterial({ color: 0x168f00 })
    );
    leaves.position.set(x, 5, z);

    scene.add(trunk, leaves);
}

for (let i = 0; i < 50; i++) {
    const side = Math.random() > 0.5 ? -1 : 1;
    createTree(side * (11 + Math.random() * 12), -Math.random() * 180 + 10);
}

const lanes = [-6, -3, 0, 3, 6];
lanes.forEach(x => {
    const line = new THREE.Mesh(
        new THREE.BoxGeometry(0.15, 0.02, 220),
        new THREE.MeshBasicMaterial({ color: 0x33aa33 })
    );
    line.position.set(x, 0.01, -80);
    scene.add(line);
});

// ======================
// EL CASTILLO
// ======================
const castleGroup = new THREE.Group();
const castleMat = new THREE.MeshPhongMaterial({ color: 0x666666 });

const mainWall = new THREE.Mesh(new THREE.BoxGeometry(18, 6, 3), castleMat);
mainWall.position.set(0, 3, 14);
castleGroup.add(mainWall);

const towerL = new THREE.Mesh(new THREE.CylinderGeometry(1.8, 1.8, 9, 6), castleMat);
towerL.position.set(-10, 4.5, 14);
castleGroup.add(towerL);

const towerR = new THREE.Mesh(new THREE.CylinderGeometry(1.8, 1.8, 9, 6), castleMat);
towerR.position.set(10, 4.5, 14);
castleGroup.add(towerR);

scene.add(castleGroup);

// ======================
// VARIABLES DE JUEGO
// ======================
let score = 0;
let castleLife = 20;
let wave = 1;
let enemiesKilled = 0;
let enemiesPerWave = 10;
let gameOver = false;

let bossActive = false;
let bossMesh = null;
let bossLife = 20;

const bullets = [];
const enemies = [];

// ======================
// SONIDOS SINTETIZADOS
// ======================
const audioContext = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
    if (audioContext.state === 'suspended') audioContext.resume();
    
    const osc = audioContext.createOscillator();
    const gain = audioContext.createGain();
    osc.connect(gain);
    gain.connect(audioContext.destination);

    if (type === "shoot") {
        osc.type = "square";
        osc.frequency.setValueAtTime(550, audioContext.currentTime);
        gain.gain.setValueAtTime(0.05, audioContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + 0.1);
        osc.start();
        osc.stop(audioContext.currentTime + 0.1);
    }
    if (type === "death") {
        osc.type = "sawtooth";
        osc.frequency.setValueAtTime(160, audioContext.currentTime);
        osc.frequency.exponentialRampToValueAtTime(40, audioContext.currentTime + 0.3);
        gain.gain.setValueAtTime(0.12, audioContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + 0.3);
        osc.start();
        osc.stop(audioContext.currentTime + 0.3);
    }
    if (type === "bossHit") {
        osc.type = "triangle";
        osc.frequency.setValueAtTime(120, audioContext.currentTime);
        gain.gain.setValueAtTime(0.15, audioContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + 0.1);
        osc.start();
        osc.stop(audioContext.currentTime + 0.1);
    }
}

// ======================
// DISPARAR PROYECTILES
// ======================
function fireBullet() {
    if (gameOver) return;

    const bullet = new THREE.Mesh(
        new THREE.SphereGeometry(0.16, 4, 4),
        new THREE.MeshBasicMaterial({ color: 0xffff00 })
    );

    bullet.position.copy(fpsControls.position);

    const direction = new THREE.Vector3();
    camera.getWorldDirection(direction);
    bullet.userData = { dir: direction.normalize() };

    bullets.push(bullet);
    scene.add(bullet);
    playSound("shoot");
}

// ======================
// GENERAR ENEMIGOS / JEFE
// ======================
function spawnEnemy() {
    if (gameOver || bossActive || enemiesKilled >= enemiesPerWave) return;

    const enemy = new THREE.Mesh(
        new THREE.BoxGeometry(1, 1, 1),
        new THREE.MeshPhongMaterial({ color: 0xff2222 })
    );

    const lane = lanes[Math.floor(Math.random() * lanes.length)];
    enemy.position.set(lane, 0.5, -70);

    enemies.push(enemy);
    scene.add(enemy);
}

function spawnBoss() {
    bossActive = true;
    bossLife = 20;

    bossMesh = new THREE.Mesh(
        new THREE.BoxGeometry(3.2, 3.2, 3.2),
        new THREE.MeshPhongMaterial({ color: 0x00cc44 })
    );

    const lane = lanes[Math.floor(Math.random() * lanes.length)];
    bossMesh.position.set(lane, 1.6, -80);
    scene.add(bossMesh);

    document.getElementById("bossLifeContainer").style.display = "block";
    document.getElementById("bossLabel").style.display = "block";
    updateBossBar();
}

setInterval(() => {
    spawnEnemy();
}, Math.max(280, 900 - wave * 50));

// ======================
// ACTUALIZAR INTERFAZ GRAFICA
// ======================
function updateCastleLife() {
    const percent = Math.max(0, (castleLife / 20) * 100);
    document.getElementById("castleLifeBar").style.width = percent + "%";
}

function updateWaveBar() {
    const percent = Math.min(100, (enemiesKilled / enemiesPerWave) * 100);
    document.getElementById("waveBar").style.width = percent + "%";
}

function updateBossBar() {
    const percent = Math.max(0, (bossLife / 20) * 100);
    document.getElementById("bossLifeBar").style.width = percent + "%";
}

function nextWave() {
    wave++;
    enemiesKilled = 0;
    enemiesPerWave += 5;
    bossActive = false;
    
    document.getElementById("waveText").textContent = "Oleada: " + wave;
    document.getElementById("bossLifeContainer").style.display = "none";
    document.getElementById("bossLabel").style.display = "none";
    updateWaveBar();
}

// ======================
// BUCLE RECURSIVO DEL MOTOR (UPDATE)
// ======================
function update() {
    if (gameOver) return;

    // Movimiento sutil de las nubes en el cielo
    cloudGroup.children.forEach(cloud => {
        cloud.position.x += 0.01;
        if(cloud.position.x > 60) cloud.position.x = -60;
    });

    // Control por botones táctiles A y D
    if (keys.KeyA) fpsControls.position.x -= 0.15;
    if (keys.KeyD) fpsControls.position.x += 0.15;

    if (fpsControls.position.x < -6.2) fpsControls.position.x = -6.2;
    if (fpsControls.position.x > 6.2) fpsControls.position.x = 6.2;

    // Balas 3D
    bullets.forEach((b, bi) => {
        const dir = b.userData.dir;
        b.position.addScaledVector(dir, 1.3);

        if (b.position.lengthSq() > 140 * 140) {
            scene.remove(b);
            bullets.splice(bi, 1);
        }
    });

    // Movimiento del Jefe Final
    if (bossActive && bossMesh) {
        bossMesh.position.z += 0.06;

        if (bossMesh.position.z > 13) {
            scene.remove(bossMesh);
            bossMesh = null;
            castleLife -= 5;
            updateCastleLife();
            playSound("death");
            checkGameOver();
            if (!gameOver) nextWave();
        }
    }

    // Movimiento de Enemigos
    enemies.forEach((e, ei) => {
        e.position.z += 0.15;

        if (e.position.z > 13) {
            scene.remove(e);
            enemies.splice(ei, 1);
            castleLife--;
            updateCastleLife();
            playSound("death");
            checkGameOver();
        }
    });

    // Colisiones tridimensionales
    bullets.forEach((b, bi) => {
        
        if (bossActive && bossMesh) {
            if (b.position.distanceTo(bossMesh.position) < 2.0) {
                scene.remove(b);
                bullets.splice(bi, 1);
                bossLife -= 1;
                updateBossBar();
                playSound("bossHit");

                if (bossLife <= 0) {
                    playSound("death");
                    scene.remove(bossMesh);
                    bossMesh = null;
                    score += 50;
                    document.getElementById("score").textContent = "Puntos: " + score;
                    nextWave();
                }
                return;
            }
        }

        enemies.forEach((e, ei) => {
            if (b.position.distanceTo(e.position) < 0.85) {
                playSound("death");
                scene.remove(e);
                scene.remove(b);

                enemies.splice(ei, 1);
                bullets.splice(bi, 1);

                score++;
                enemiesKilled++;
                updateWaveBar();

                document.getElementById("score").textContent = "Puntos: " + score;

                if (enemiesKilled >= enemiesPerWave && !bossActive) {
                    enemies.forEach(rem => scene.remove(rem));
                    enemies.length = 0;
                    spawnBoss();
                }
            }
        });
    });
}

function checkGameOver() {
    if (castleLife <= 0 && !gameOver) {
        gameOver = true;
        clearInterval(autoFireInterval);
        setTimeout(() => {
            alert("EL CASTILLO HA CAÍDO\nPuntaje: " + score);
            location.reload();
        }, 200);
    }
}

// ======================
// ANIMACIÓN RENDERING
// ======================
function animate() {
    requestAnimationFrame(animate);
    update();
    renderer.render(scene, camera);
}

animate();

// Inicializar interfaz táctil
updateCastleLife();
updateWaveBar();

window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
