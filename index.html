<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
<title>Shooter Selva Pro - Móvil</title>

<style>
body {
    margin: 0; overflow: hidden; background: #000;
    user-select: none; -webkit-user-select: none; touch-action: none;
    font-family: Arial, sans-serif;
}

/* INTERFAZ DE INDICACIONES */
#tutorial-overlay {
    position: absolute; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.85); color: #fff;
    display: flex; flex-direction: column; justify-content: center;
    align-items: center; z-index: 100; text-align: center; padding: 20px;
    box-sizing: border-box;
}
.instruccion { margin: 10px 0; color: #00ff99; font-size: 18px; }
#start-btn {
    margin-top: 25px; padding: 15px 40px; background: #00ff99;
    color: #000; font-weight: bold; border-radius: 30px; cursor: pointer;
    border: none; font-size: 20px;
}

/* BARRAS DE ESTADO */
#ui-top {
    position: absolute; top: 10px; left: 10px; z-index: 10; pointer-events: none;
}
.stat-box { margin-bottom: 5px; }
.label { font-size: 12px; color: #ccc; margin-bottom: 2px; }
.bar-bg { width: 150px; height: 10px; background: #222; border: 1px solid #fff; }
.bar-fill { width: 100%; height: 100%; transition: width 0.3s; }
#castle-bar { background: #00ff00; }
#wave-bar { background: #00aaff; width: 0%; }
#boss-ui { display: none; margin-top: 10px; }
#boss-bar { background: #ff00ff; border: 1px solid #ffaa00; }

/* CONTROLES MÓVILES */
#joystick-zone {
    position: absolute; bottom: 40px; left: 40px;
    width: 120px; height: 120px; background: rgba(255,255,255,0.1);
    border-radius: 50%; border: 2px solid rgba(255,255,255,0.3);
    display: flex; justify-content: center; align-items: center;
}
#joystick-handle {
    width: 50px; height: 50px; background: rgba(255,255,255,0.6);
    border-radius: 50%; position: absolute;
}
#fire-btn {
    position: absolute; bottom: 40px; right: 40px;
    width: 100px; height: 100px; background: rgba(255, 0, 0, 0.4);
    border: 4px solid rgba(255, 255, 255, 0.6); border-radius: 50%;
    display: flex; justify-content: center; align-items: center;
    color: white; font-weight: bold; font-size: 16px;
}
#crosshair {
    position: absolute; top: 50%; left: 50%; width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.8); border-radius: 50%;
    transform: translate(-50%, -50%); pointer-events: none;
}
</style>
</head>
<body>

<div id="tutorial-overlay">
    <h1 style="color: #00ff99; margin-bottom: 5px;">SELVA SHOOTER 3D</h1>
    <p style="color: #ffaa00;">📱 Recomendado: Pantalla Horizontal</p>
    <div class="instruccion">👆 Toca y arrastra para MIRAR (360°)</div>
    <div class="instruccion">🕹️ Usa el Joystick para MOVERTE</div>
    <div class="instruccion">🔴 Presiona el botón ROJO para DISPARAR</div>
    <button id="start-btn">¡EMPEZAR!</button>
</div>

<div id="crosshair"></div>

<div id="ui-top">
    <div id="score-text" style="color: white; font-size: 20px; font-weight: bold;">Puntos: 0</div>
    <div class="stat-box">
        <div class="label">Castillo</div>
        <div class="bar-bg"><div id="castle-bar" class="bar-fill"></div></div>
    </div>
    <div class="stat-box">
        <div id="wave-text" class="label">Oleada: 1</div>
        <div class="bar-bg"><div id="wave-bar" class="bar-fill"></div></div>
    </div>
    <div id="boss-ui">
        <div class="label" style="color: #ff55ff; font-weight: bold;">¡JEFE FINAL!</div>
        <div class="bar-bg"><div id="boss-bar" class="bar-fill"></div></div>
    </div>
</div>

<div id="joystick-zone">
    <div id="joystick-handle"></div>
</div>

<div id="fire-btn">FUEGO</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js';

// --- CONFIGURACIÓN ESCENA ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a2a3a);
scene.fog = new THREE.FogExp2(0x1a2a3a, 0.02);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const playerBase = new THREE.Object3D();
playerBase.position.set(0, 1.6, 8);
scene.add(playerBase);
playerBase.add(camera);

// --- LUCES ---
const light = new THREE.DirectionalLight(0xffffff, 1.5);
light.position.set(10, 20, 10);
scene.add(light);
scene.add(new THREE.AmbientLight(0x778899, 0.6));

// --- ENTORNO ---
const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 300), new THREE.MeshPhongMaterial({color: 0x1a331a}));
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// Árboles optimizados
for(let i=0; i<40; i++){
    const tree = new THREE.Group();
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 3, 6), new THREE.MeshPhongMaterial({color: 0x4a2e16}));
    const leaves = new THREE.Mesh(new THREE.SphereGeometry(1.5, 4, 4), new THREE.MeshPhongMaterial({color: 0x168f00}));
    leaves.position.y = 2.5;
    tree.add(trunk, leaves);
    tree.position.set((Math.random()-0.5)*50, 1.5, -Math.random()*150);
    scene.add(tree);
}

// Castillo
const castle = new THREE.Mesh(new THREE.BoxGeometry(16, 6, 4), new THREE.MeshPhongMaterial({color: 0x555555}));
castle.position.set(0, 3, 14);
scene.add(castle);

// --- VARIABLES DE JUEGO ---
let score = 0, castleLife = 20, wave = 1, enemiesKilled = 0, enemiesPerWave = 10;
let bossActive = false, bossLife = 40, bossMesh = null; // VIDA DEL JEFE DUPLICADA A 40
let isGameRunning = false;

// --- JOYSTICK LOGIC ---
const joyZone = document.getElementById('joystick-zone');
const joyHandle = document.getElementById('joystick-handle');
let moveX = 0, joyActive = false;

joyZone.addEventListener('touchstart', e => { joyActive = true; });
joyZone.addEventListener('touchmove', e => {
    if(!joyActive) return;
    const touch = e.touches[0];
    const rect = joyZone.getBoundingClientRect();
    const centerX = rect.left + rect.width/2;
    let dx = touch.clientX - centerX;
    const limit = rect.width/2;
    dx = Math.max(-limit, Math.min(limit, dx));
    joyHandle.style.transform = `translateX(${dx}px)`;
    moveX = dx / limit; // -1 a 1
});
joyZone.addEventListener('touchend', () => {
    joyActive = false;
    joyHandle.style.transform = `translateX(0px)`;
    moveX = 0;
});

// --- MIRADA (TOUCH) ---
let lastTouchX = 0, lastTouchY = 0, pitch = 0, yaw = 0;
document.addEventListener('touchstart', e => {
    if(e.target.id === "" || e.target.tagName === "CANVAS") {
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
    }
});
document.addEventListener('touchmove', e => {
    if(e.target.tagName === "CANVAS") {
        const dx = e.touches[0].clientX - lastTouchX;
        const dy = e.touches[0].clientY - lastTouchY;
        yaw -= dx * 0.005;
        pitch -= dy * 0.005;
        pitch = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, pitch));
        playerBase.rotation.y = yaw;
        camera.rotation.x = pitch;
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
    }
});

// --- DISPARO ---
const bullets = [];
function fire(){
    if(!isGameRunning) return;
    const b = new THREE.Mesh(new THREE.SphereGeometry(0.15, 4, 4), new THREE.MeshBasicMaterial({color: 0xffff00}));
    b.position.copy(playerBase.position);
    const dir = new THREE.Vector3();
    camera.getWorldDirection(dir);
    b.userData.dir = dir.normalize();
    bullets.push(b);
    scene.add(b);
    playSfx(600, 0.1);
}
document.getElementById('fire-btn').addEventListener('touchstart', e => { e.preventDefault(); fire(); });

// --- SFX SINTETIZADO ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSfx(f, d){
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.setValueAtTime(f, audioCtx.currentTime);
    g.gain.setValueAtTime(0.1, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
    o.start(); o.stop(audioCtx.currentTime + d);
}

// --- ENEMIGOS ---
const enemies = [];
function spawn(){
    if(!isGameRunning || bossActive || enemiesKilled >= enemiesPerWave) return;
    const e = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshPhongMaterial({color: 0xff3333}));
    e.position.set((Math.random()-0.5)*12, 0.5, -80);
    enemies.push(e);
    scene.add(e);
}
setInterval(spawn, 1000);

function spawnBoss(){
    bossActive = true; bossLife = 40;
    bossMesh = new THREE.Mesh(new THREE.BoxGeometry(4,4,4), new THREE.MeshPhongMaterial({color: 0x00ff66}));
    bossMesh.position.set(0, 2, -80);
    scene.add(bossMesh);
    document.getElementById('boss-ui').style.display = 'block';
}

// --- LOOP ---
function update(){
    if(!isGameRunning) return;

    // Movimiento Joystick
    playerBase.position.x += moveX * 0.15;
    playerBase.position.x = Math.max(-8, Math.min(8, playerBase.position.x));

    // Balas
    bullets.forEach((b, i) => {
        b.position.addScaledVector(b.userData.dir, 1.2);
        if(b.position.z < -100) { scene.remove(b); bullets.splice(i, 1); }
    });

    // Enemigos
    enemies.forEach((e, i) => {
        e.position.z += 0.15;
        if(e.position.z > 13) {
            scene.remove(e); enemies.splice(i, 1);
            castleLife--; updateUI();
            if(castleLife <= 0) endGame();
        }
    });

    // Boss
    if(bossActive && bossMesh){
        bossMesh.position.z += 0.05;
        if(bossMesh.position.z > 13) { 
            castleLife -= 5; bossActive = false; scene.remove(bossMesh); 
            document.getElementById('boss-ui').style.display = 'none';
            updateUI(); if(castleLife <= 0) endGame();
        }
    }

    // Colisiones
    bullets.forEach((b, bi) => {
        if(bossActive && bossMesh && b.position.distanceTo(bossMesh.position) < 2.5){
            scene.remove(b); bullets.splice(bi, 1);
            bossLife--; updateUI();
            if(bossLife <= 0){
                scene.remove(bossMesh); bossActive = false;
                score += 50; enemiesKilled = 0; wave++; 
                enemiesPerWave += 5; updateUI();
                document.getElementById('boss-ui').style.display = 'none';
            }
        }
        enemies.forEach((e, ei) => {
            if(b.position.distanceTo(e.position) < 1){
                scene.remove(b); scene.remove(e);
                bullets.splice(bi, 1); enemies.splice(ei, 1);
                score++; enemiesKilled++; updateUI();
                if(enemiesKilled >= enemiesPerWave) spawnBoss();
            }
        });
    });
}

function updateUI(){
    document.getElementById('score-text').innerText = `Puntos: ${score}`;
    document.getElementById('castle-bar').style.width = `${(castleLife/20)*100}%`;
    document.getElementById('wave-bar').style.width = `${(enemiesKilled/enemiesPerWave)*100}%`;
    document.getElementById('wave-text').innerText = `Oleada: ${wave}`;
    if(bossActive) document.getElementById('boss-bar').style.width = `${(bossLife/40)*100}%`;
}

function endGame(){
    isGameRunning = false;
    alert("¡EL CASTILLO HA CAÍDO!\nPuntos: " + score);
    location.reload();
}

function animate(){
    requestAnimationFrame(animate);
    update();
    renderer.render(scene, camera);
}

// Botón de Inicio
document.getElementById('start-btn').addEventListener('click', () => {
    document.getElementById('tutorial-overlay').style.display = 'none';
    if(audioCtx.state === 'suspended') audioCtx.resume();
    isGameRunning = true;
});

animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
